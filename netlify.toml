[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

# Nitro's netlify preset emits its own functions + redirects into the
# publish directory at build time, so no extra [[redirects]] block is needed.
# SPA-style fallback is included as a safety net for any unmatched asset path.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false
